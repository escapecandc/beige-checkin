<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理画面 | BEIGE-checkin</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #1a1a2e;
      --accent: #4f8ef7;
      --accent2: #7c5cbf;
      --bg: #f5f6fa;
      --card: #ffffff;
      --text: #1a1a2e;
      --sub: #6b7280;
      --border: #e5e7eb;
      --success: #22c55e;
      --danger: #ef4444;
      --warning: #f59e0b;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'Hiragino Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ===== LOGIN ===== */
    #login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--primary), #2d2b55);
    }
    .login-card {
      background: white;
      border-radius: 20px;
      padding: 40px;
      width: 360px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .login-logo { font-size: 40px; text-align: center; margin-bottom: 8px; }
    .login-title { font-size: 22px; font-weight: 800; text-align: center; margin-bottom: 4px; }
    .login-sub { font-size: 14px; color: var(--sub); text-align: center; margin-bottom: 28px; }
    .login-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .login-field label { font-size: 13px; font-weight: 600; color: var(--sub); }
    .login-field input {
      padding: 12px 14px;
      border: 2px solid var(--border);
      border-radius: 10px;
      font-size: 16px;
      outline: none;
      transition: border-color 0.15s;
    }
    .login-field input:focus { border-color: var(--accent); }
    .login-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
    }
    .login-btn:hover { opacity: 0.9; }
    .login-error {
      color: var(--danger);
      font-size: 13px;
      text-align: center;
      margin-top: 10px;
      display: none;
    }

    /* ===== MAIN ===== */
    #main-screen { display: none; }

    /* ===== HEADER ===== */
    .header {
      background: var(--primary);
      color: white;
      padding: 16px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-logo { font-size: 24px; }
    .header-title { font-size: 18px; font-weight: 800; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .logout-btn {
      padding: 8px 16px;
      background: rgba(255,255,255,0.15);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 13px;
      cursor: pointer;
    }
    .logout-btn:hover { background: rgba(255,255,255,0.25); }

    /* ===== CONTENT ===== */
    .content { max-width: 1100px; margin: 0 auto; padding: 28px 24px; }

    /* ===== STATS ===== */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .stat-label { font-size: 13px; color: var(--sub); font-weight: 600; }
    .stat-value { font-size: 32px; font-weight: 900; }
    .stat-value.green { color: var(--success); }
    .stat-value.blue { color: var(--accent); }
    .stat-value.orange { color: var(--warning); }

    /* ===== TOOLBAR ===== */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .filter-tabs { display: flex; gap: 6px; }
    .filter-tab {
      padding: 8px 16px;
      border-radius: 20px;
      border: 2px solid var(--border);
      background: white;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      color: var(--sub);
    }
    .filter-tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }
    .toolbar-right { margin-left: auto; display: flex; gap: 8px; }
    .csv-btn {
      padding: 8px 16px;
      background: var(--success);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .refresh-btn {
      padding: 8px 16px;
      background: white;
      color: var(--text);
      border: 2px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    /* ===== TABLE ===== */
    .table-wrap {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    thead { background: #f8faff; }
    th {
      padding: 12px 16px;
      text-align: left;
      font-size: 12px;
      font-weight: 700;
      color: var(--sub);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 14px 16px;
      font-size: 14px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr.clickable { cursor: pointer; transition: background 0.1s; }
    tr.clickable:hover { background: #f8faff; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
    }
    .badge-green { background: #dcfce7; color: #15803d; }
    .badge-blue { background: #dbeafe; color: #1d4ed8; }
    .badge-gray { background: #f3f4f6; color: #6b7280; }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--sub);
    }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }

    /* ===== MODAL ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      display: none;
      align-items: flex-start;
      justify-content: center;
      padding: 20px;
      overflow-y: auto;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: white;
      border-radius: 20px;
      width: 100%;
      max-width: 720px;
      margin: auto;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .modal-header {
      background: var(--primary);
      color: white;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-title { font-size: 18px; font-weight: 800; }
    .modal-close {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-body { padding: 24px; display: flex; flex-direction: column; gap: 20px; }

    .detail-section {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .detail-section-title {
      background: #f8faff;
      padding: 10px 16px;
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border);
    }
    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
    }
    .detail-row {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-label { font-size: 11px; color: var(--sub); font-weight: 600; text-transform: uppercase; }
    .detail-value { font-size: 14px; font-weight: 600; }

    .photo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 16px; }
    .photo-item { display: flex; flex-direction: column; gap: 6px; }
    .photo-label { font-size: 12px; font-weight: 600; color: var(--sub); }
    .photo-img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg);
    }
    .photo-placeholder {
      width: 100%;
      aspect-ratio: 4/3;
      border-radius: 10px;
      border: 2px dashed var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--sub);
      font-size: 13px;
      background: var(--bg);
    }

    .guest-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
    .guest-tab {
      padding: 6px 14px;
      border-radius: 20px;
      border: 2px solid var(--border);
      background: white;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .guest-tab.active { background: var(--accent); border-color: var(--accent); color: white; }

    .loading {
      text-align: center;
      padding: 40px;
      color: var(--sub);
      font-size: 15px;
    }
  </style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">🏠</div>
    <div class="login-title">BEIGE 管理画面</div>
    <div class="login-sub">チェックイン管理システム</div>
    <div class="login-field">
      <label>パスワード</label>
      <input type="password" id="pw-input" placeholder="パスワードを入力" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="login-btn" onclick="doLogin()">ログイン</button>
    <div class="login-error" id="login-error">パスワードが違います</div>
  </div>
</div>

<!-- ===== MAIN ===== -->
<div id="main-screen">
  <div class="header">
    <div class="header-left">
      <div class="header-logo">🏠</div>
      <div class="header-title">BEIGE 管理画面</div>
    </div>
    <div class="header-right">
      <span style="font-size:13px; opacity:0.7;" id="last-updated"></span>
      <button class="logout-btn" onclick="doLogout()">ログアウト</button>
    </div>
  </div>

  <div class="content">
    <!-- 統計 -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">現在チェックイン中</div>
        <div class="stat-value green" id="stat-active">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">今月のチェックイン</div>
        <div class="stat-value blue" id="stat-month">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">累計チェックイン</div>
        <div class="stat-value" id="stat-total">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">今月の総宿泊者数</div>
        <div class="stat-value orange" id="stat-guests">—</div>
      </div>
    </div>

    <!-- ツールバー -->
    <div class="toolbar">
      <div class="filter-tabs">
        <button class="filter-tab active" onclick="setFilter('all', this)">すべて</button>
        <button class="filter-tab" onclick="setFilter('checked-in', this)">チェックイン中</button>
        <button class="filter-tab" onclick="setFilter('checked-out', this)">チェックアウト済</button>
      </div>
      <div class="toolbar-right">
        <button class="refresh-btn" onclick="loadData()">↻ 更新</button>
        <button class="csv-btn" onclick="exportCSV()">📥 CSV出力</button>
      </div>
    </div>

    <!-- テーブル -->
    <div class="table-wrap">
      <div id="table-loading" class="loading">読み込み中...</div>
      <table id="main-table" style="display:none">
        <thead>
          <tr>
            <th>日時</th>
            <th>部屋</th>
            <th>代表者</th>
            <th>人数</th>
            <th>ステータス</th>
            <th>チェックアウト</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
      <div id="empty-state" class="empty-state" style="display:none">
        <div class="empty-icon">📋</div>
        <div>チェックインデータがありません</div>
      </div>
    </div>
  </div>
</div>

<!-- ===== 詳細モーダル ===== -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">チェックイン詳細</div>
      <button class="modal-close" onclick="closeModalDirect()">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
// ===== FIREBASE =====
const firebaseConfig = {
  apiKey: "AIzaSyDVXp3E5D7LWNNW2shkf13fVeSmU-BwmsM",
  authDomain: "beige-checkin.firebaseapp.com",
  projectId: "beige-checkin",
  storageBucket: "beige-checkin.firebasestorage.app",
  messagingSenderId: "937457079326",
  appId: "1:937457079326:web:c922c779005c1324ca4a0f"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ===== パスワード（変更可能） =====
const ADMIN_PASSWORD = 'beige2024';

// ===== STATE =====
let allData = [];
let currentFilter = 'all';
let currentGuestTab = 0;

// ===== LOGIN =====
function doLogin() {
  const pw = document.getElementById('pw-input').value;
  if (pw === ADMIN_PASSWORD) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-screen').style.display = 'block';
    loadData();
  } else {
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('pw-input').value = '';
  }
}

function doLogout() {
  document.getElementById('main-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('pw-input').value = '';
}

// ===== DATA =====
async function loadData() {
  document.getElementById('table-loading').style.display = 'block';
  document.getElementById('main-table').style.display = 'none';
  document.getElementById('empty-state').style.display = 'none';

  try {
    const snap = await db.collection('checkins').orderBy('checkinTime', 'desc').limit(200).get();
    allData = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    updateStats();
    renderTable();
    const now = new Date();
    document.getElementById('last-updated').textContent =
      `最終更新: ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  } catch (e) {
    console.error(e);
    document.getElementById('table-loading').textContent = 'データの読み込みに失敗しました';
  }
}

function updateStats() {
  const now = new Date();
  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);

  const active = allData.filter(d => d.status === 'checked-in').length;
  const monthData = allData.filter(d => {
    const t = d.checkinTime?.toDate?.();
    return t && t >= monthStart;
  });
  const monthGuests = monthData.reduce((sum, d) => sum + (d.totalGuests || 0), 0);

  document.getElementById('stat-active').textContent = active;
  document.getElementById('stat-month').textContent = monthData.length;
  document.getElementById('stat-total').textContent = allData.length;
  document.getElementById('stat-guests').textContent = monthGuests;
}

function setFilter(filter, el) {
  currentFilter = filter;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderTable();
}

function renderTable() {
  const filtered = currentFilter === 'all'
    ? allData
    : allData.filter(d => d.status === currentFilter);

  document.getElementById('table-loading').style.display = 'none';

  if (filtered.length === 0) {
    document.getElementById('main-table').style.display = 'none';
    document.getElementById('empty-state').style.display = 'block';
    return;
  }

  document.getElementById('main-table').style.display = 'table';
  document.getElementById('empty-state').style.display = 'none';

  const tbody = document.getElementById('table-body');
  tbody.innerHTML = filtered.map(d => {
    const checkinTime = d.checkinTime?.toDate?.();
    const checkoutTime = d.checkoutTime?.toDate?.();
    const rep = d.guests?.[0];
    const isActive = d.status === 'checked-in';

    return `
      <tr class="clickable" onclick="openModal('${d.id}')">
        <td>
          <div style="font-weight:600">${formatDate(checkinTime)}</div>
          <div style="font-size:12px;color:var(--sub)">${formatTime(checkinTime)}</div>
        </td>
        <td><strong>${d.room || '—'}</strong></td>
        <td>${rep?.name || '—'}</td>
        <td><strong>${d.totalGuests || '—'}</strong>名</td>
        <td>
          ${isActive
            ? '<span class="badge badge-green">✓ チェックイン中</span>'
            : '<span class="badge badge-gray">チェックアウト済</span>'}
        </td>
        <td style="color:var(--sub); font-size:13px">
          ${checkoutTime ? formatDate(checkoutTime) + ' ' + formatTime(checkoutTime) : '—'}
        </td>
      </tr>
    `;
  }).join('');
}

// ===== MODAL =====
function openModal(id) {
  const data = allData.find(d => d.id === id);
  if (!data) return;
  currentGuestTab = 0;

  const checkinTime = data.checkinTime?.toDate?.();
  const checkoutTime = data.checkoutTime?.toDate?.();
  const isActive = data.status === 'checked-in';

  document.getElementById('modal-title').textContent =
    `${data.room} — ${data.guests?.[0]?.name || ''}様 ご一行`;

  const body = document.getElementById('modal-body');

  // ゲストタブ
  const guestTabsHtml = (data.guests || []).map((g, i) => `
    <button class="guest-tab ${i === 0 ? 'active' : ''}"
      onclick="switchGuestTab(${i}, '${id}')" id="gtab-${i}">
      ${i + 1}人目${i === 0 ? '（代表）' : ''}
    </button>
  `).join('');

  body.innerHTML = `
    <!-- 基本情報 -->
    <div class="detail-section">
      <div class="detail-section-title">チェックイン情報</div>
      <div class="detail-grid">
        <div class="detail-row">
          <div class="detail-label">部屋</div>
          <div class="detail-value">${data.room || '—'}</div>
        </div>
        <div class="detail-row">
          <div class="detail-label">宿泊人数</div>
          <div class="detail-value">${data.totalGuests || '—'}名</div>
        </div>
        <div class="detail-row">
          <div class="detail-label">チェックイン</div>
          <div class="detail-value">${checkinTime ? formatDate(checkinTime) + ' ' + formatTime(checkinTime) : '—'}</div>
        </div>
        <div class="detail-row">
          <div class="detail-label">チェックアウト</div>
          <div class="detail-value">${checkoutTime ? formatDate(checkoutTime) + ' ' + formatTime(checkoutTime) : isActive ? '滞在中' : '—'}</div>
        </div>
        <div class="detail-row" style="grid-column:1/-1">
          <div class="detail-label">ステータス</div>
          <div class="detail-value">
            ${isActive
              ? '<span class="badge badge-green">✓ チェックイン中</span>'
              : '<span class="badge badge-gray">チェックアウト済</span>'}
          </div>
        </div>
      </div>
    </div>

    <!-- ゲストタブ -->
    ${(data.guests || []).length > 1 ? `
    <div>
      <div style="font-size:12px;font-weight:700;color:var(--sub);margin-bottom:8px">宿泊者を選択</div>
      <div class="guest-tabs">${guestTabsHtml}</div>
    </div>` : ''}

    <!-- ゲスト詳細 -->
    <div id="guest-detail-${id}">
      ${renderGuestDetail(data.guests?.[0], 0)}
    </div>

    <!-- 集合写真 -->
    <div class="detail-section">
      <div class="detail-section-title">集合写真</div>
      <div style="padding:16px">
        ${data.groupPhoto
          ? `<img src="${data.groupPhoto}" style="width:100%;border-radius:10px;border:1px solid var(--border)">`
          : '<div class="photo-placeholder">集合写真なし</div>'}
      </div>
    </div>
  `;

  document.getElementById('modal-overlay').classList.add('show');
}

function renderGuestDetail(guest, idx) {
  if (!guest) return '<div style="padding:16px;color:var(--sub)">データなし</div>';
  return `
    <div class="detail-section">
      <div class="detail-section-title">${idx + 1}人目の情報</div>
      <div class="detail-grid">
        <div class="detail-row">
          <div class="detail-label">氏名</div>
          <div class="detail-value">${guest.name || '—'}</div>
        </div>
        <div class="detail-row">
          <div class="detail-label">性別</div>
          <div class="detail-value">${genderLabel(guest.gender)}</div>
        </div>
        <div class="detail-row">
          <div class="detail-label">生年月日</div>
          <div class="detail-value">${guest.dob || '—'}</div>
        </div>
        <div class="detail-row">
          <div class="detail-label">職業</div>
          <div class="detail-value">${guest.job || '—'}</div>
        </div>
        <div class="detail-row" style="grid-column:1/-1">
          <div class="detail-label">住所</div>
          <div class="detail-value">${guest.addr || '—'}</div>
        </div>
        <div class="detail-row">
          <div class="detail-label">電話番号</div>
          <div class="detail-value">${guest.phone || '—'}</div>
        </div>
        <div class="detail-row">
          <div class="detail-label">日本在住</div>
          <div class="detail-value">${guest.isJapan ? 'はい' : 'いいえ'}</div>
        </div>
        ${!guest.isJapan ? `
        <div class="detail-row">
          <div class="detail-label">国籍</div>
          <div class="detail-value">${guest.nationality || '—'}</div>
        </div>
        <div class="detail-row">
          <div class="detail-label">旅券番号</div>
          <div class="detail-value">${guest.passportNo || '—'}</div>
        </div>` : ''}
      </div>
      ${!guest.isJapan ? `
      <div style="padding:12px 16px; border-top:1px solid var(--border)">
        <div class="detail-label" style="margin-bottom:8px">パスポート写真</div>
        ${guest.passportPhoto
          ? `<img src="${guest.passportPhoto}" style="max-width:280px;border-radius:10px;border:1px solid var(--border)">`
          : '<div class="photo-placeholder" style="max-width:280px;height:120px">写真なし</div>'}
      </div>` : ''}
    </div>
  `;
}

function switchGuestTab(idx, docId) {
  currentGuestTab = idx;
  document.querySelectorAll('.guest-tab').forEach((t, i) => {
    t.classList.toggle('active', i === idx);
  });
  const data = allData.find(d => d.id === docId);
  document.getElementById(`guest-detail-${docId}`).innerHTML =
    renderGuestDetail(data?.guests?.[idx], idx);
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modal-overlay').classList.remove('show');
}

// ===== CSV出力 =====
function exportCSV() {
  const filtered = currentFilter === 'all' ? allData : allData.filter(d => d.status === currentFilter);
  if (filtered.length === 0) { alert('出力するデータがありません'); return; }

  const rows = [['チェックイン日時','チェックアウト日時','部屋','ステータス','氏名','性別','生年月日','職業','住所','電話番号','日本在住','国籍','旅券番号']];

  filtered.forEach(d => {
    const checkinTime = d.checkinTime?.toDate?.();
    const checkoutTime = d.checkoutTime?.toDate?.();
    (d.guests || []).forEach(g => {
      rows.push([
        checkinTime ? formatDateTime(checkinTime) : '',
        checkoutTime ? formatDateTime(checkoutTime) : '',
        d.room || '',
        d.status === 'checked-in' ? 'チェックイン中' : 'チェックアウト済',
        g.name || '',
        genderLabel(g.gender),
        g.dob || '',
        g.job || '',
        g.addr || '',
        g.phone || '',
        g.isJapan ? 'はい' : 'いいえ',
        g.nationality || '',
        g.passportNo || '',
      ]);
    });
  });

  const bom = '\uFEFF';
  const csv = bom + rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `宿泊者名簿_${formatDate(new Date()).replace(/\//g,'-')}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

// ===== UTILS =====
function formatDate(d) {
  if (!d) return '—';
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
}
function formatTime(d) {
  if (!d) return '';
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function formatDateTime(d) {
  return `${formatDate(d)} ${formatTime(d)}`;
}
function genderLabel(g) {
  return g === 'male' ? '男性' : g === 'female' ? '女性' : g === 'other' ? 'その他' : '—';
}
</script>
